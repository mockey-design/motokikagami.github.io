<main class="cv-page">
  <div class="container">

    <div class="section-header fade-in" style="margin-bottom:2rem">
      <span class="section-label">Academic</span>
      <h1 class="section-title">Curriculum Vitae</h1>
      <div class="section-divider" aria-hidden="true"></div>
    </div>

    <!-- Actions -->
    <div class="cv-actions fade-in">
      <p style="font-size:0.9rem;color:var(--c-text-muted);font-weight:300">
        Updated March 2026
      </p>
      <a href="cv.pdf" download class="cv-download-btn" aria-label="Download CV as PDF">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M10 3v10M6 9l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M3 16h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Download PDF
      </a>
    </div>

    <!-- Desktop: embed -->
    <div class="cv-embed-wrap fade-in">
      <iframe
        src="cv.pdf"
        title="Curriculum Vitae of Motoki Kagami"
        type="application/pdf"
        aria-label="CV PDF viewer">
      </iframe>
      <!-- Mobile fallback -->
      <div class="cv-mobile-msg">
        <p>PDF viewer is not available on mobile.<br>Please download the CV to view it.</p>
        <a href="cv.pdf" download class="cv-download-btn">
          <svg width="14" height="14" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M10 3v10M6 9l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M3 16h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>

        </a>
